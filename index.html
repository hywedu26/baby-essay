<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>육아 에세이</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <section id="login-screen" class="screen">
            <div class="login-container">
                <h1>육아 에세이</h1>
                <p>소중한 순간들을 기록하고, 특별한 이야기로 만들어 보세요.</p>
                <form id="login-form">
                    <div class="input-group">
                        <label for="username">아이디</label>
                        <input type="text" id="username" name="username" required>
                    </div>
                    <div class="input-group">
                        <label for="password">비밀번호</label>
                        <input type="password" id="password" name="password" required>
                    </div>
                    <button type="submit" class="login-button">로그인</button>
                </form>
            </div>
        </section>

        <section id="main-screen" class="screen hidden">
            <header>
                <div class="profile-greeting">
                    <img src="" alt="프로필 사진" class="profile-picture">
                    <span>환영합니다, <span id="user-id"></span>님!</span>
                </div>
            </header>
            <main>
                <div id="entry-form-container">
                    <form id="entry-form">
                        <div class="form-group">
                            <label for="entry-date">날짜</label>
                            <input type="date" id="entry-date" name="entry-date" required>
                        </div>
                        <div class="form-group">
                            <label for="entry-text">오늘의 기록</label>
                            <textarea id="entry-text" name="entry-text" rows="4" placeholder="어떤 특별한 순간이 있었나요?"></textarea>
                        </div>
                        <div class="form-group">
                            <label for="entry-photo">사진 추가</label>
                            <input type="file" id="entry-photo" name="entry-photo" accept="image/*">
                            <img id="photo-preview" src="" alt="사진 미리보기" class="hidden">
                        </div>
                        <button type="submit" class="submit-button">기록 저장</button>
                    </form>
                </div>
                <button id="generate-essay-button" class="action-button">AI 에세이 생성</button>
                <div id="entries-container"></div>
            </main>
        </section>
    </div>

    <!-- MODAL HAS BEEN TEMPORARILY REMOVED FOR DEBUGGING -->

    <script src="main.js"></script>
</body>
</html>
